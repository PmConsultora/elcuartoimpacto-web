# Netlify — El Cuarto Impacto
# Deploy: netlify deploy --prod --dir ./elcuartoimpacto-web

[build]
  publish = "."

[[redirects]]
  from = "/verificar/:codigo"
  to = "/verificar.html?codigo=:codigo"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "https://cuarto-impacto-sistema-1.onrender.com/api/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
